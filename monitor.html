<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alcea — Kitchen Stock Board</title>
<meta name="theme-color" content="#0d1f1a">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1f1a;--panel:#123028;--line:#2a5347;
    --ink:#f3efe2;--ink-dim:#a9bdb1;--ink-faint:#6f8a7c;--gold:#c8a04e;
    --critical:#e5544e;--warning:#e3b23c;--buy:#e5544e;--prep-ok:#8fc9a3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{
    background:radial-gradient(120% 90% at 50% -20%, #17392f 0%, var(--bg) 55%), var(--bg);
    color:var(--ink);font-family:'Jost',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;height:100vh;display:flex;flex-direction:column;
  }

  .bar{flex:none;display:flex;align-items:center;justify-content:space-between;
    padding:1.6vh 2vw;border-bottom:1px solid var(--line);gap:2vw}
  .brand{display:flex;align-items:baseline;gap:.7vw}
  .brand .word{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:3.4vh;letter-spacing:.15vw;line-height:1}
  .brand .tag{font-size:1.35vh;letter-spacing:.35vw;color:var(--gold);font-weight:600}
  .board-title{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:1.7vh;letter-spacing:.35vw;text-transform:uppercase;color:var(--ink-dim)}
  .clock{display:flex;align-items:center;gap:1.2vw}
  .live{display:flex;align-items:center;gap:.5vw;font-size:1.5vh;letter-spacing:.2vw;text-transform:uppercase;color:var(--ink-faint);font-weight:600;font-family:'Barlow Semi Condensed',sans-serif}
  .live .pulse{width:1vh;height:1vh;border-radius:50%;background:var(--prep-ok);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(143,201,163,.5)}70%{box-shadow:0 0 0 1vh rgba(143,201,163,0)}100%{box-shadow:0 0 0 0 rgba(143,201,163,0)}}
  .updated{font-size:1.7vh;color:var(--ink-dim);font-variant-numeric:tabular-nums;font-family:'Barlow Semi Condensed',sans-serif}
  .exit{width:3.4vh;height:3.4vh;border-radius:.8vh;border:1px solid var(--line);background:transparent;color:var(--ink-faint);font-size:1.9vh;display:flex;align-items:center;justify-content:center;text-decoration:none}

  .cols{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1.4vw;padding:1.6vh 2vw;min-height:0}
  .col{display:flex;flex-direction:column;min-height:0}
  .sec-head{flex:none;display:flex;align-items:center;gap:1vw;margin-bottom:1.2vh}
  .sec-dot{width:1.6vh;height:1.6vh;border-radius:.4vh;flex:none}
  .sec-critical .sec-dot{background:var(--critical);box-shadow:0 0 2vh var(--critical)}
  .sec-warning .sec-dot{background:var(--warning);box-shadow:0 0 1.8vh var(--warning)}
  .sec-title{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:3vh;letter-spacing:.25vw;text-transform:uppercase;line-height:1}
  .sec-critical .sec-title{color:var(--critical)}
  .sec-warning .sec-title{color:var(--warning)}
  .sec-range{font-size:1.5vh;color:var(--ink-faint);font-weight:500}
  .sec-count{margin-left:auto;font-family:'Barlow Semi Condensed',sans-serif;font-size:1.6vh;letter-spacing:.15vw;color:var(--ink-faint);text-transform:uppercase}

  .list{flex:1;display:flex;flex-direction:column;gap:1.1vh;min-height:0;overflow:hidden}

  .dish{position:relative;display:flex;align-items:center;gap:1.6vw;background:var(--panel);border:1px solid var(--line);border-radius:1.2vh;padding:0 1.6vw;overflow:hidden;flex:1;min-height:0}
  .dish::before{content:"";position:absolute;left:0;top:0;bottom:0;width:.6vw}
  .dish.crit::before{background:var(--critical)}
  .dish.warn::before{background:var(--warning)}
  .dish-count{font-family:'Barlow Semi Condensed',sans-serif;font-weight:700;font-size:6.5vh;line-height:.82;font-variant-numeric:tabular-nums;min-width:9vh;text-align:center;margin-left:.6vw}
  .dish.crit .dish-count{color:var(--critical)}
  .dish.warn .dish-count{color:var(--warning)}
  .dish-count .unit{display:block;font-size:1.2vh;letter-spacing:.15vw;font-weight:600;color:var(--ink-faint);margin-top:.6vh;text-transform:uppercase;font-family:'Jost',sans-serif}
  .dish-mid{flex:1;min-width:0}
  .dish-name{font-size:3vh;font-weight:600;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .dish-note{display:inline-flex;align-items:center;gap:.5vw;margin-top:1vh;font-size:1.6vh;font-weight:600;padding:.6vh 1vw;border-radius:3vh}
  .note-buy{background:rgba(229,84,78,.14);color:var(--buy);border:1px solid rgba(229,84,78,.4)}
  .note-prep{background:rgba(143,201,163,.12);color:var(--prep-ok);border:1px solid rgba(143,201,163,.3)}

  .empty-sec{flex:1;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);font-size:1.8vh;border:1px dashed var(--line);border-radius:1.2vh}
  .empty-sec.clear{color:var(--prep-ok);border-color:rgba(143,201,163,.3)}

  .rail{flex:none;display:flex;align-items:center;gap:1.5vw;padding:1.1vh 2vw;border-top:1px solid var(--line)}
  .rail .h-lbl{font-family:'Barlow Semi Condensed',sans-serif;font-weight:600;font-size:1.4vh;letter-spacing:.2vw;text-transform:uppercase;color:var(--prep-ok);flex:none}
  .rail .h-items{display:flex;gap:1.4vw;overflow:hidden;flex:1;white-space:nowrap}
  .rail .h-item{font-size:1.7vh;color:var(--ink-dim)}
  .rail .h-item b{color:var(--ink);font-variant-numeric:tabular-nums}
  .pager{margin-left:auto;flex:none;display:flex;align-items:center;gap:1vw}
  .pager .lbl{font-family:'Barlow Semi Condensed',sans-serif;font-size:1.5vh;letter-spacing:.15vw;color:var(--ink-faint);text-transform:uppercase}
  .pager .track{width:8vw;height:.6vh;background:var(--line);border-radius:1vh;overflow:hidden}
  .pager .fill{height:100%;width:0;background:var(--gold);border-radius:1vh;transition:width .1s linear}
  .pager.hidden{display:none}

  @media (prefers-reduced-motion:reduce){.live .pulse{animation:none}.pager .fill{transition:none}}
</style>
</head>
<body>

<div class="bar">
  <div class="brand"><span class="word">ALCEA</span><span class="tag">KITCHEN BOARD</span></div>
  <div class="board-title">Dishes we can still cook</div>
  <div class="clock">
    <span class="live"><span class="pulse"></span>Live</span>
    <span class="updated" id="updated">—</span>
    <a class="exit" href="index.html" title="Exit">✕</a>
  </div>
</div>

<div class="cols">
  <div class="col sec-critical">
    <div class="sec-head"><span class="sec-dot"></span><span class="sec-title">Critical</span>
      <span class="sec-range">under 10 left</span><span class="sec-count" id="crit-count"></span></div>
    <div class="list" id="crit-list"></div>
  </div>
  <div class="col sec-warning">
    <div class="sec-head"><span class="sec-dot"></span><span class="sec-title">Warning</span>
      <span class="sec-range">under 20 left</span><span class="sec-count" id="warn-count"></span></div>
    <div class="list" id="warn-list"></div>
  </div>
</div>

<div class="rail">
  <span class="h-lbl">Well stocked</span>
  <div class="h-items" id="healthy"></div>
  <div class="pager hidden" id="pager">
    <span class="lbl" id="pager-lbl">Page 1 / 1</span>
    <div class="track"><div class="fill" id="pager-fill"></div></div>
  </div>
</div>

<script>
/* ============================================================
   DUMMY DATA — hardcoded, NOT connected to the live database.
     cookable  = how many more can be made from current prep
     canRefill = true  -> kitchen can prep more (raw available)
                 false -> raw also low, manager must buy
   ============================================================ */
const DISHES = [
  { name:"Nasi Lemak",         cookable:4,  canRefill:false },
  { name:"Eggs Benedict",      cookable:6,  canRefill:true  },
  { name:"Roti Bakar Set",     cookable:8,  canRefill:false },
  { name:"Chicken Chop",       cookable:9,  canRefill:true  },
  { name:"Mee Rebus",          cookable:9,  canRefill:false },
  { name:"Big Breakfast",      cookable:13, canRefill:false },
  { name:"Mee Goreng",         cookable:15, canRefill:true  },
  { name:"Kaya Toast",         cookable:18, canRefill:true  },
  { name:"Nasi Goreng Kampung",cookable:19, canRefill:false },
  { name:"Teh Tarik",          cookable:44, canRefill:true  },
  { name:"Kopi O",             cookable:52, canRefill:true  },
  { name:"Milo Dinosaur",      cookable:31, canRefill:true  },
];

const CRIT = 10, WARN = 20;
const MAX_PER_COL = 4;        // cards per column before it paginates
const PAGE_SECONDS = 8;       // seconds each page shows
const DATA_REFRESH_MS = 30000;

let page = 0, pageCount = 1, tick = null;

function noteHTML(c){
  return c ? `<span class="dish-note note-prep">✓ Can prep more</span>`
           : `<span class="dish-note note-buy">▲ Buy ingredients</span>`;
}
function card(d, cls){
  return `<div class="dish ${cls}">
    <div class="dish-count">${d.cookable}<span class="unit">can cook</span></div>
    <div class="dish-mid"><div class="dish-name">${d.name}</div>${noteHTML(d.canRefill)}</div>
  </div>`;
}
function buckets(){
  const crit=DISHES.filter(d=>d.cookable<CRIT).sort((a,b)=>a.cookable-b.cookable);
  const warn=DISHES.filter(d=>d.cookable>=CRIT&&d.cookable<WARN).sort((a,b)=>a.cookable-b.cookable);
  const healthy=DISHES.filter(d=>d.cookable>=WARN).sort((a,b)=>a.cookable-b.cookable);
  return {crit,warn,healthy};
}

function render(){
  const {crit,warn,healthy}=buckets();
  document.getElementById('crit-count').textContent = crit.length+(crit.length===1?' dish':' dishes');
  document.getElementById('warn-count').textContent = warn.length+(warn.length===1?' dish':' dishes');

  pageCount = Math.max(1, Math.ceil(Math.max(crit.length,warn.length)/MAX_PER_COL));
  if(page>=pageCount) page=0;

  const slice = a => a.slice(page*MAX_PER_COL, page*MAX_PER_COL+MAX_PER_COL);
  const cP=slice(crit), wP=slice(warn);

  document.getElementById('crit-list').innerHTML =
    cP.length ? cP.map(d=>card(d,'crit')).join('') : `<div class="empty-sec clear">No critical dishes</div>`;
  document.getElementById('warn-list').innerHTML =
    wP.length ? wP.map(d=>card(d,'warn')).join('') : `<div class="empty-sec">Nothing in warning</div>`;

  document.getElementById('healthy').innerHTML =
    healthy.length ? healthy.map(d=>`<span class="h-item">${d.name} <b>${d.cookable}</b></span>`).join('')
                   : `<span class="h-item">—</span>`;

  const pager=document.getElementById('pager');
  if(pageCount>1){ pager.classList.remove('hidden'); document.getElementById('pager-lbl').textContent=`Page ${page+1} / ${pageCount}`; }
  else pager.classList.add('hidden');

  stamp();
}
function stamp(){
  const n=new Date();
  document.getElementById('updated').textContent='Updated '+n.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

/* page rotation + progress bar */
function startPaging(){
  clearInterval(tick);
  const fill=document.getElementById('pager-fill');
  let elapsed=0;
  tick=setInterval(()=>{
    if(pageCount<=1){ fill.style.width='0%'; return; }
    elapsed+=0.1;
    fill.style.width=Math.min(100,(elapsed/PAGE_SECONDS)*100)+'%';
    if(elapsed>=PAGE_SECONDS){ elapsed=0; fill.style.width='0%'; page=(page+1)%pageCount; render(); }
  },100);
}

render();
startPaging();
setInterval(render, DATA_REFRESH_MS);
</script>
</body>
</html>
